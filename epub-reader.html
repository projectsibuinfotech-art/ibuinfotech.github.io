<!DOCTYPE html>
<html>
<head>
<title>EPUB Sample | IBU Infotech</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
<style>
body{
margin:0;
font-family:Arial;
}

header{
background:#1f2a44;
color:white;
padding:15px;
text-align:center;
}

#viewer{
height:85vh;
width:100%;
}
</style>

</head>

<body>

<header>
<h2>IBU Infotech – EPUB Sample</h2>
</header>

<div id="viewer"></div>

<script>

var book = ePub("./seh.epub");

var rendition = book.renderTo("viewer", {
  width: "100%",
  height: "100%"
});

rendition.display();

</script>

</body>
</html>
