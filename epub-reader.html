<!DOCTYPE html>
<html>
<head>
<title>EPUB Sample | IBU Infotech</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
<style>
body{
margin:0;
font-family:Arial;
}

header{
background:#1f2a44;
color:white;
padding:15px;
text-align:center;
}

#viewer {
  height: 90vh;
  overflow: auto;
}
</style>

</head>

<body>

<header>
<h2>IBU Infotech – EPUB Sample</h2>
</header>

<div id="viewer"></div>
<script>

const params = new URLSearchParams(window.location.search);
const bookFile = params.get("book");

var book = ePub("./epubs/" + bookFile);

var rendition = book.renderTo("viewer", {
  width: "100%",
  height: "100%",
  flow: "scrolled-doc"
});


rendition.display();

</script>
</body>
</html>
