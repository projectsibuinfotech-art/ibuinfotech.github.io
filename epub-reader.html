<!DOCTYPE html>
<html>
<head>
<title>EPUB Sample | IBU Infotech</title>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
}

header{
background:#1f2a44;
color:white;
padding:15px;
text-align:center;
}

#viewer{
height:85vh;
width:100%;
}
</style>

</head>

<body>

<header>
<h2>IBU Infotech – EPUB Sample</h2>
</header>

<div id="viewer"></div>

<script>

fetch("seh.epub")
.then(response => response.arrayBuffer())
.then(data => {

  var book = ePub(data);

  var rendition = book.renderTo("viewer", {
    width: "100%",
    height: "100%"
  });

  rendition.display();

})
.catch(err => console.log("EPUB failed to load:", err));

</script>

</body>
</html>
